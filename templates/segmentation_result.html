<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>セグメンテーション結果</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>セグメンテーション結果</h1>
    <p class="lead">
        モデル設定: <strong>{{ selected_model_label }}</strong><br>
        道路マスク推論: <strong>{{ segmentation_backend }}</strong><br>
        <span class="subtle">{{ segmentation_detail }}</span>
    </p>

    <div class="grid top-grid">
        <div class="result-card">
            <h2>入力画像</h2>
            <img src="{{ url_for('static', filename=input_image) }}">
        </div>

        <div class="result-card">
            <h2>道路マスク（生出力）</h2>
            <img src="{{ url_for('static', filename=raw_mask_image) }}">
        </div>

        <div class="result-card">
            <h2>道路マスク（後処理後）</h2>
            <img src="{{ url_for('static', filename=clean_mask_image) }}">
        </div>
    </div>
    <p class="subtle">※ 上段はモデル生出力と、俯瞰生成用の後処理マスクを並べて表示しています。</p>

    <div class="grid top-grid">
        <div class="result-card">
            <h2>重畳（生出力）</h2>
            <img src="{{ url_for('static', filename=raw_overlay_image) }}">
        </div>

        <div class="result-card">
            <h2>重畳（後処理後）</h2>
            <img src="{{ url_for('static', filename=clean_overlay_image) }}">
        </div>
    </div>

    <a href="{{ url_for('index') }}" class="back">戻る</a>
</div>
</body>
</html>
